<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Danh sách sản phẩm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <span class="logo"><a href="index.html">ShopLite</a></span>
        <input type="text" placeholder="Tìm kiếm sản phẩm...">
        <span class="cart">Giỏ hàng (3)</span>
    </header>

    <main>
        <section>
            <h1>Sản phẩm</h1>
            <div class="product-grid">
                <article class="product-card">
                    <div class="product-image">Ảnh sản phẩm 1</div>
                    <h2><a href="product.html">Sản phẩm 1</a></h2>
                    <p class="product-price">100.000đ</p>
                    <button class="btn-add-cart">Thêm vào giỏ</button>
                </article>
                <article class="product-card">
                    <div class="product-image">Ảnh sản phẩm 2</div>
                    <h2><a href="product.html">Sản phẩm 2</a></h2>
                    <p class="product-price">200.000đ</p>
                    <button class="btn-add-cart">Thêm vào giỏ</button>
                </article>
                <article class="product-card">
                    <div class="product-image">Ảnh sản phẩm 3</div>
                    <h2><a href="product.html">Sản phẩm 3</a></h2>
                    <p class="product-price">300.000đ</p>
                    <button class="btn-add-cart">Thêm vào giỏ</button>
                </article>
                <article class="product-card">
                    <div class="product-image">Ảnh sản phẩm 4</div>
                    <h2><a href="product.html">Sản phẩm 4</a></h2>
                    <p class="product-price">400.000đ</p>
                    <button class="btn-add-cart">Thêm vào giỏ</button>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>Thông tin ShopLite Store</p>
        <nav>
            <a href="#">Giới thiệu</a> | 
            <a href="#">Liên hệ</a>
        </nav>
    </footer>

</body>
</html>
