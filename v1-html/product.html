<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <span class="logo"><a href="index.html">ShopLite</a></span>
        <input type="text" placeholder="Tìm kiếm sản phẩm...">
        <span class="cart"><a href="cart.html">Giỏ hàng (3)</a></span>
    </header>

    <main>
        <a href="index.html" class="back-link">← Quay lại trang chủ</a>

        <div class="product-detail-grid">
            <div class="product-detail-image">
                Ảnh sản phẩm lớn
            </div>

            <div class="product-detail-info">
                <h2>Điện thoại thông minh LitePhone 12</h2>
                <p class="product-detail-price">12.490.000đ</p>
                <p class="product-description">
                    Đây là mô tả chi tiết của sản phẩm mẫu.
                </p>
                <button type="button" class="btn-large">Thêm vào giỏ hàng</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Thông tin ShopLite Store</p>
        <nav>
            <a href="#">Giới thiệu</a> |
            <a href="#">Liên hệ</a>
        </nav>
    </footer>

</body>
</html>
